<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Header Section (Implicit TopAppBar Brand) -->
<header class="fixed top-0 w-full flex justify-between items-center px-margin-mobile h-14 bg-surface-dim border-b border-border-gray z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">precision_manufacturing</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary-container tracking-wider">5S AUDIT SYSTEM</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-secondary">settings</span>
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-lg flex flex-col items-center gap-stack-lg pt-14">
<!-- ID Badge Styled Card -->
<div class="relative w-full aspect-[3/4] max-w-[360px] bg-surface-container border-2 border-border-gray rounded-lg overflow-hidden flex flex-col shadow-2xl id-badge-texture">
<!-- Badge Top Bar -->
<div class="bg-primary-container h-8 w-full flex items-center px-4 justify-between">
<span class="font-label-sm text-on-primary-container uppercase tracking-widest">Authorized Personnel Only</span>
<div class="flex gap-1">
<div class="w-2 h-2 rounded-full bg-on-primary-container opacity-30"></div>
<div class="w-2 h-2 rounded-full bg-on-primary-container opacity-30"></div>
</div>
</div>
<!-- Internal Badge Layout -->
<div class="flex-1 p-6 flex flex-col items-center justify-between">
<!-- ID Photo Placeholder / Profile Icon -->
<div class="relative w-40 h-40 border-4 border-border-gray bg-surface-container-high rounded-sm flex items-center justify-center group overflow-hidden">
<div class="scan-line"></div>
<span class="material-symbols-outlined text-8xl text-secondary opacity-50 transition-transform group-hover:scale-110 duration-500" data-icon="account_circle">account_circle</span>
<div class="absolute bottom-0 w-full bg-safety-orange/80 py-1 flex justify-center">
<span class="text-[10px] font-bold text-black uppercase tracking-tighter">Biometric Pending</span>
</div>
</div>
<!-- Identity Info -->
<div class="w-full text-center space-y-2">
<div class="border-b-2 border-border-gray pb-2">
<h2 class="font-display-lg text-display-lg text-primary uppercase" id="role-display">OPERATOR</h2>
<p class="font-label-md text-label-md text-secondary tracking-[0.2em] -mt-1">PLANT-04 SYSTEM ACCESS</p>
</div>
<div class="flex justify-between items-center pt-2">
<div class="text-left">
<span class="block text-[10px] text-secondary-fixed-dim uppercase font-bold">Issue Date</span>
<span class="font-label-sm text-label-sm">24-MAY-2024</span>
</div>
<div class="text-right">
<span class="block text-[10px] text-secondary-fixed-dim uppercase font-bold">Clearance</span>
<span class="font-label-sm text-label-sm text-safety-green">LEVEL 02</span>
</div>
</div>
</div>
<!-- Input Zone -->
<div class="w-full space-y-stack-sm mt-4">
<div class="relative">
<input class="w-full bg-surface-container-lowest border-2 border-border-gray focus:border-primary-container outline-none px-4 h-touch-target-min text-center font-bold tracking-[0.5em] placeholder:tracking-normal placeholder:font-normal placeholder:text-secondary-fixed-dim rounded-lg transition-colors" placeholder="ENTER ACCESS CODE" type="password"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-2">
<span class="material-symbols-outlined text-secondary text-sm">lock</span>
</div>
</div>
</div>
</div>
<!-- Card Magnetic Strip (Visual Decor) -->
<div class="bg-black/40 h-10 w-full border-t border-border-gray flex items-center justify-center">
<div class="w-1/2 h-1 bg-border-gray rounded-full opacity-50"></div>
</div>
</div>
<!-- Role Toggle / Selection -->
<div class="w-full flex flex-col gap-stack-sm">
<div class="flex p-1 bg-surface-container-low border-2 border-border-gray rounded-lg w-full">
<button class="flex-1 py-3 font-label-md text-label-md uppercase tracking-widest transition-all bg-primary-container text-on-primary-container rounded-lg" id="btn-operator" onclick="switchRole('OPERATOR')">
                    OPERATOR
                </button>
<button class="flex-1 py-3 font-label-md text-label-md uppercase tracking-widest transition-all text-secondary hover:bg-surface-variant rounded-lg" id="btn-manager" onclick="switchRole('MANAGER')">
                    MANAGER
                </button>
</div>
<p class="text-[10px] text-secondary text-center uppercase font-bold tracking-widest px-4">
                Select interface profile to proceed with audit floor protocols
            </p>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min bg-primary-container text-on-primary-container font-headline-md text-headline-md uppercase tracking-widest border-b-4 border-primary-fixed-dim active:border-b-0 active:translate-y-1 transition-all rounded-lg flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
            INITIALIZE SESSION
        </button>
<!-- Footer Help -->
<div class="flex gap-stack-lg mt-stack-md">
<button class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-lg">help</span> Support
            </button>
<button class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-lg">language</span> Network
            </button>
</div>
</main>
<!-- Decorative background elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-5">
<div class="w-full h-full bg-cover" data-alt="A macro close-up of a brushed metal industrial surface with subtle scratches and a cool steel-blue tint. The lighting is harsh and dramatic, highlighting the texture of the material and reinforcing a sense of rugged durability and precision engineering. Cinematic industrial photography style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuASptJOC9n0DvqTksHSRxKTyk9H1yG6OodBDygW5ltivn2IXRsJbvieJdrdpPK1NfSWTqkWgBTgVKupEvUWeYQmB8rh-VdDBJAShrrseyOoaRoCF5bLguz8vgIW_9UAG7Mb68j4pwge4Seyy4k7HaLrZI1qzKtC0Vj-HIKLpWcTSCxXXubY9iH839FT2t6NAu_CDtn4It2w5ppQpBqnN_ZSwplqZvOFnaNHzomNlrjcVMAhT8brlyTW10Za4knRuofe-8iy-sDuQ56D')"></div>
</div>
<script>
        function switchRole(role) {
            const roleDisplay = document.getElementById('role-display');
            const btnOp = document.getElementById('btn-operator');
            const btnMgr = document.getElementById('btn-manager');

            roleDisplay.innerText = role;

            if (role === 'OPERATOR') {
                btnOp.classList.add('bg-primary-container', 'text-on-primary-container');
                btnOp.classList.remove('text-secondary', 'hover:bg-surface-variant');
                btnMgr.classList.remove('bg-primary-container', 'text-on-primary-container');
                btnMgr.classList.add('text-secondary', 'hover:bg-surface-variant');
            } else {
                btnMgr.classList.add('bg-primary-container', 'text-on-primary-container');
                btnMgr.classList.remove('text-secondary', 'hover:bg-surface-variant');
                btnOp.classList.remove('bg-primary-container', 'text-on-primary-container');
                btnOp.classList.add('text-secondary', 'hover:bg-surface-variant');
            }

            // Haptic/visual feedback simulation
            roleDisplay.classList.add('scale-110', 'opacity-50');
            setTimeout(() => {
                roleDisplay.classList.remove('scale-110', 'opacity-50');
            }, 150);
        }

        // Simple button active state visual micro-interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('brightness-90'));
            btn.addEventListener('touchend', () => btn.classList.remove('brightness-90'));
        });
    </script>
</body></html>
